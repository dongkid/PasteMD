<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteMD 设置</title>
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #2d2d2d;
            --bg-hover: #3d3d3d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #4fc3f7;
            --accent-hover: #29b6f6;
            --border: #404040;
            --success: #66bb6a;
            --warning: #ffa726;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        header .version {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-label {
            display: flex;
            flex-direction: column;
        }

        .setting-label .title {
            font-weight: 500;
        }

        .setting-label .desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        input[type="text"], select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 14px;
            min-width: 180px;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .hotkey-input {
            cursor: pointer;
            text-align: center;
        }

        .hotkey-input.recording {
            border-color: var(--warning);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 状态指示器 */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>PasteMD 设置</h1>
            <div class="version" id="version">WebView Demo</div>
        </header>

        <div class="section">
            <div class="section-title">快捷键</div>
            <div class="setting-item">
                <div class="setting-label">
                    <span class="title">粘贴热键</span>
                    <span class="desc">全局快捷键触发 Markdown 转换粘贴</span>
                </div>
                <input type="text" id="hotkey" class="hotkey-input" readonly value="Ctrl+Shift+B"
                       onclick="startRecording()" placeholder="点击录制...">
            </div>
        </div>

        <div class="section">
            <div class="section-title">通用设置</div>
            <div class="setting-item">
                <div class="setting-label">
                    <span class="title">界面语言</span>
                    <span class="desc">选择应用显示语言</span>
                </div>
                <select id="language">
                    <option value="zh-CN">简体中文</option>
                    <option value="en-US">English</option>
                    <option value="ja-JP">日本語</option>
                </select>
            </div>
            <div class="setting-item">
                <div class="setting-label">
                    <span class="title">无目标应用时</span>
                    <span class="desc">当未检测到 Word/Excel 时的行为</span>
                </div>
                <select id="noAppAction">
                    <option value="notify">发送通知</option>
                    <option value="silent">静默忽略</option>
                    <option value="clipboard">仅转换到剪贴板</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-title">状态</div>
            <div class="setting-item">
                <div class="setting-label">
                    <span class="title"><span class="status-dot"></span>Pandoc</span>
                    <span class="desc">Markdown 转换引擎</span>
                </div>
                <span style="color: var(--success);">已安装</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" onclick="closeWindow()">取消</button>
            <button class="btn" onclick="saveSettings()">保存设置</button>
        </div>
    </div>

    <div class="toast" id="toast">设置已保存</div>

    <script>
        let isRecording = false;

        // 页面加载时获取设置
        window.addEventListener('pywebviewready', async () => {
            console.log('pywebview ready!');

            // 获取版本
            const version = await window.pywebview.api.get_version();
            document.getElementById('version').textContent = version;

            // 获取设置
            const settingsJson = await window.pywebview.api.get_settings();
            const settings = JSON.parse(settingsJson);

            document.getElementById('hotkey').value = settings.hotkey || 'Ctrl+Shift+B';
            document.getElementById('language').value = settings.language || 'zh-CN';
            document.getElementById('noAppAction').value = settings.no_app_action || 'notify';
        });

        // 保存设置
        async function saveSettings() {
            const settings = {
                hotkey: document.getElementById('hotkey').value,
                language: document.getElementById('language').value,
                no_app_action: document.getElementById('noAppAction').value
            };

            if (window.pywebview) {
                const result = await window.pywebview.api.save_settings(JSON.stringify(settings));
                const response = JSON.parse(result);
                showToast(response.message);
            } else {
                console.log('Settings:', settings);
                showToast('设置已保存 (Demo)');
            }
        }

        // 关闭窗口
        async function closeWindow() {
            if (window.pywebview) {
                await window.pywebview.api.close_window();
            } else {
                window.close();
            }
        }

        // 热键录制 (简化版)
        function startRecording() {
            const input = document.getElementById('hotkey');
            if (isRecording) return;

            isRecording = true;
            input.classList.add('recording');
            input.value = '按下快捷键...';

            const handler = (e) => {
                e.preventDefault();

                const parts = [];
                if (e.ctrlKey) parts.push('Ctrl');
                if (e.shiftKey) parts.push('Shift');
                if (e.altKey) parts.push('Alt');
                if (e.metaKey) parts.push('Meta');

                const key = e.key.toUpperCase();
                if (!['CONTROL', 'SHIFT', 'ALT', 'META'].includes(key)) {
                    parts.push(key);
                    input.value = parts.join('+');
                    input.classList.remove('recording');
                    isRecording = false;
                    document.removeEventListener('keydown', handler);
                }
            };

            document.addEventListener('keydown', handler);
        }

        // Toast 提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
